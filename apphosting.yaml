# Firebase App Hosting backend config.
# Region is set on the App Hosting backend in the Firebase Console
# (target: europe-west3). NOT in this file.
#
# Nitro auto-detects this environment via the `firebase_app_hosting` preset —
# no firebase.json needed.

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  timeoutSeconds: 60

env: []
