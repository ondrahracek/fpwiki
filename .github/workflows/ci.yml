name: CI

on:
  push:
    branches: [master, test]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    name: lint • typecheck • test • content:validate • build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Content validate
        run: pnpm content:validate

      - name: Build
        run: pnpm build
